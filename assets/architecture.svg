<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#b89"/>
    </marker>
  </defs>
  <style>
    .t{fill:#f3e6dc;font-size:13px;font-weight:600;text-anchor:middle}
    .s{fill:#d8c4b6;font-size:11px;text-anchor:middle}
    .seam{fill:#fff;font-size:14px;font-weight:700;text-anchor:middle}
    .ln{stroke:#7a5a48;stroke-width:1.6;fill:none;marker-end:url(#arr)}
  </style>

  <rect width="960" height="480" fill="#1a1410"/>
  <text x="480" y="26" class="seam" font-size="15">Strands Robots — one agent, many runtimes</text>

  <!-- pipeline -->
  <rect x="330" y="40" width="300" height="38" rx="9" fill="#2ea44f"/>
  <text x="480" y="64" class="t">Natural-language prompt</text>
  <line class="ln" x1="480" y1="78" x2="480" y2="96"/>

  <rect x="316" y="98" width="328" height="44" rx="9" fill="#8250df"/>
  <text x="480" y="118" class="t">Strands Agent</text>
  <text x="480" y="134" class="s">Amazon Nova · Amazon Bedrock</text>
  <line class="ln" x1="480" y1="142" x2="480" y2="160"/>

  <rect x="336" y="162" width="288" height="40" rx="9" fill="#e07a3f"/>
  <text x="480" y="187" class="t" fill="#1a1008">Robot · AgentTool · move(linear_x, angular_z)</text>
  <line class="ln" x1="480" y1="202" x2="480" y2="220"/>

  <!-- the seam -->
  <rect x="80" y="222" width="800" height="48" rx="10" fill="#9c4a1e" stroke="#e07a3f" stroke-width="1.5"/>
  <text x="480" y="244" class="seam">RuntimeAdapter</text>
  <text x="480" y="261" class="s">one agent API — the runtime handles the wire</text>

  <!-- fan-out to 4 runtimes -->
  <line class="ln" x1="150" y1="270" x2="150" y2="312"/>
  <line class="ln" x1="380" y1="270" x2="380" y2="312"/>
  <line class="ln" x1="610" y1="270" x2="610" y2="312"/>
  <line class="ln" x1="840" y1="270" x2="840" y2="312"/>

  <g>
    <rect x="68"  y="314" width="164" height="38" rx="8" fill="#241a14" stroke="#5a3a2a"/>
    <text x="150" y="338" class="t">runtime: rosbridge</text>
    <rect x="298" y="314" width="164" height="38" rx="8" fill="#241a14" stroke="#5a3a2a"/>
    <text x="380" y="338" class="t">runtime: ros2</text>
    <rect x="528" y="314" width="164" height="38" rx="8" fill="#241a14" stroke="#5a3a2a"/>
    <text x="610" y="338" class="t">runtime: http</text>
    <rect x="758" y="314" width="164" height="38" rx="8" fill="#241a14" stroke="#5a3a2a"/>
    <text x="840" y="338" class="t">runtime: deepracer_v2</text>
  </g>

  <line class="ln" x1="150" y1="352" x2="150" y2="388"/>
  <line class="ln" x1="380" y1="352" x2="380" y2="388"/>
  <line class="ln" x1="610" y1="352" x2="610" y2="388"/>
  <line class="ln" x1="840" y1="352" x2="840" y2="388"/>

  <!-- targets -->
  <g>
    <rect x="60"  y="390" width="180" height="56" rx="9" fill="#b5532a"/>
    <text x="150" y="413" class="t">🔴 NASA Curiosity</text>
    <text x="150" y="431" class="s">ROS1 · Gazebo · Mars</text>

    <rect x="290" y="390" width="180" height="56" rx="9" fill="#b5532a"/>
    <text x="380" y="413" class="t">TurtleBot4 · rovers</text>
    <text x="380" y="431" class="s">ROS2 DDS · Nav2-ready</text>

    <rect x="520" y="390" width="180" height="56" rx="9" fill="#b5532a"/>
    <text x="610" y="413" class="t">OEM / REST robots</text>
    <text x="610" y="431" class="s">HTTP + auth + translators</text>

    <rect x="750" y="390" width="180" height="56" rx="9" fill="#b5532a"/>
    <text x="840" y="413" class="t">🏎️ AWS DeepRacer</text>
    <text x="840" y="431" class="s">console runtime</text>
  </g>
</svg>
